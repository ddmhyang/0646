              background-image: 
                linear-gradient(135deg, rgba(26,26,26,0) 40%, rgba(26,26,26,1) 60%), 
                url("https://ny0217.dothome.co.kr/uploads/gallery/img-68e3c897a1932.png"); /* 👈 여기에 캐릭터 전신 이미지 경로 넣기 */

              /* 그라데이션을 부모 너비의 3배(300%)로 크게 늘려서 대각선 경계선을 만듭니다 */
              background-size: 300% 100%, cover;
              
              /* 4. 시작 위치 설정 (처음엔 그라데이션의 어두운 부분이 이미지를 완전히 덮도록 우측 배치) */
              background-position: 100% 0, center center;
              background-repeat: no-repeat;

              /* 5. 부드러운 전환을 위한 transition 효과 */
              transition: background-position 0.6s ease-in-out;
            }
